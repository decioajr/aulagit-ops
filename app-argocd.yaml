apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/decioajr/aulagit-ops.git
    path: argocd
    targetRevision: main
    #directory:
      #recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd